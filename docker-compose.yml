services:
  postgres:
    image: postgres:16
    container_name: scorekeeper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scorekeeper}
      POSTGRES_USER: ${POSTGRES_USER:-scorekeeper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - scorekeeper-postgres-data:/var/lib/postgresql/data

volumes:
  scorekeeper-postgres-data:
