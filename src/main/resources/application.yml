spring:
  application:
    name: scorekeeper-be

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:scorekeeper}
    username: ${POSTGRES_USER:scorekeeper}
    password: ${POSTGRES_PASSWORD:scorekeeper}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
